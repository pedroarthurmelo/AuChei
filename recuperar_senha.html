<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha - AuChei</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="min-h-screen flex items-center justify-center bg-background px-4">
    <div class="w-full max-w-md bg-card border border-border rounded-2xl p-6">
      <h1 class="text-2xl font-bold text-foreground mb-2">Recuperar senha</h1>
      <p class="text-sm text-muted-foreground mb-6">
        Informe seu e-mail para receber o link de redefinição.
      </p>

      <form id="recover-form" class="space-y-4">
        <input
          type="email"
          name="email"
          placeholder="Seu e-mail"
          class="w-full px-3 py-2 rounded-lg border border-border bg-background text-sm"
          required
        >

        <button
          type="submit"
          class="w-full px-4 py-2 rounded-lg bg-primary text-primary-foreground text-sm font-medium"
        >
          Enviar link
        </button>
      </form>

      <p class="text-sm text-center mt-4">
        <a href="login.html" class="text-primary hover:underline">Voltar ao login</a>
      </p>
    </div>
  </main>

  <div id="toast-box" class="area-toast"></div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script>
    (function () {
      const form = document.getElementById('recover-form');
      const { toast } = window.AuCheiUtils;
      const { requestJson, buildApiUrl } = window.AuCheiApi;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const botao = form.querySelector('button[type="submit"]');
        const textoOriginal = botao.textContent;

        const email = form.elements.email.value.trim();

        if (!email) {
          toast('Informe seu e-mail.', 'error');
          return;
        }

        botao.disabled = true;
        botao.textContent = 'Enviando...';

        try {
          const resposta = await requestJson(buildApiUrl('solicitar_recuperacao.php'), {
            method: 'POST',
            body: JSON.stringify({ email })
          });

          toast(resposta.mensagem || 'Se o e-mail existir, enviaremos o link.');
          form.reset();
        } catch (error) {
          toast(error.message || 'Não foi possível solicitar a recuperação.', 'error');
        } finally {
          botao.disabled = false;
          botao.textContent = textoOriginal;
        }
      });
    })();
  </script>
</body>
</html>
